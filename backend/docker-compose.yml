services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifem-radar-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ifemfweilun:P%40ssw0rdIfem@db:5432/ifem_radar
      PORT: "8080"
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - ifem_net

  db:
    image: postgres:16
    container_name: ifem-radar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ifemfweilun
      POSTGRES_PASSWORD: P@ssw0rdIfem
      POSTGRES_DB: ifem_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./survey.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifemfweilun -d ifem_radar"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - ifem_net

volumes:
  postgres_data:

networks:
  ifem_net:
    driver: bridge
